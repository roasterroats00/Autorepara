version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autorepara-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: autorepara
      POSTGRES_PASSWORD: autorepara123
      POSTGRES_DB: autorepara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autorepara -d autorepara"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
